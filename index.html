<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malody to osu!mania Converter</title>
    <!-- 引入 Pyodide -->
    <script src="https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet" />
    <style>
        :root {
            /* MD3 Dark Theme - Custom Pink/Violet Palette */
            --md-sys-color-background: #141218;
            --md-sys-color-on-background: #E6E0E9;
            --md-sys-color-surface: #141218;
            --md-sys-color-surface-container: #211F26;
            --md-sys-color-surface-container-high: #2B2930;
            --md-sys-color-primary: #FFB1C8; 
            --md-sys-color-on-primary: #650033;
            --md-sys-color-primary-container: #8E004A;
            --md-sys-color-on-primary-container: #FFD9E2;
            --md-sys-color-secondary: #C0C1A9; 
            --md-sys-color-error: #FFB4AB;
            --md-sys-color-on-error: #690005;
            --md-sys-color-success: #81C784;
            
            --md-sys-shape-corner-extra-large: 28px;
            --md-sys-shape-corner-large: 16px;
            --md-sys-shape-corner-medium: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--md-sys-color-background);
            color: var(--md-sys-color-on-background);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }

        .app-container {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        .header {
            text-align: center;
        }

        .header h1 {
            font-size: 36px;
            font-weight: 700;
            color: var(--md-sys-color-primary);
            letter-spacing: -0.5px;
            margin-bottom: 12px;
        }

        .header p {
            font-size: 16px;
            color: var(--md-sys-color-on-background);
            opacity: 0.8;
            line-height: 1.5;
        }

        .card {
            background-color: var(--md-sys-color-surface-container);
            border-radius: var(--md-sys-shape-corner-extra-large);
            padding: 32px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
        }

        .upload-area {
            border: 2px dashed rgba(255, 177, 200, 0.3);
            border-radius: var(--md-sys-shape-corner-large);
            padding: 48px 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.2, 0, 0, 1);
            background-color: var(--md-sys-color-surface-container-high);
        }

        .upload-area:hover, .upload-area.dragover {
            background-color: rgba(255, 177, 200, 0.08);
            border-color: var(--md-sys-color-primary);
            transform: translateY(-2px);
        }

        .upload-icon {
            font-size: 48px;
            color: var(--md-sys-color-primary);
            margin-bottom: 16px;
        }

        .upload-text {
            font-size: 18px;
            font-weight: 500;
            color: var(--md-sys-color-on-background);
            margin-bottom: 8px;
        }

        .upload-subtext {
            font-size: 14px;
            color: var(--md-sys-color-on-background);
            opacity: 0.6;
        }

        input[type="file"] {
            display: none;
        }

        .file-list {
            margin-top: 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 8px;
        }

        .file-list::-webkit-scrollbar {
            width: 8px;
        }

        .file-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .file-list::-webkit-scrollbar-thumb {
            background: var(--md-sys-color-surface-container-high);
            border-radius: 4px;
        }

        .file-item {
            background-color: var(--md-sys-color-surface-container-high);
            border-radius: var(--md-sys-shape-corner-medium);
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 16px;
            animation: slideIn 0.3s ease-out forwards;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .file-icon {
            color: var(--md-sys-color-secondary);
            font-size: 28px;
        }

        .file-info {
            flex-grow: 1;
            min-width: 0;
        }

        .file-name {
            font-size: 15px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 4px;
        }

        .file-status-text {
            font-size: 13px;
            opacity: 0.7;
        }

        .status-icon-container {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
        }

        .status-icon {
            font-size: 24px;
        }

        .status-icon.success { color: var(--md-sys-color-success); }
        .status-icon.error { color: var(--md-sys-color-error); }
        
        .loader {
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: var(--md-sys-color-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .hidden {
            display: none !important;
        }

        #initStatus {
            text-align: center;
            padding: 32px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
        }
        
        #initStatus .loader {
            width: 48px;
            height: 48px;
            border-width: 4px;
        }

        #initStatus > div:last-child {
            font-size: 16px;
            font-weight: 500;
            color: var(--md-sys-color-on-background);
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <h1>Malody to osu!</h1>
            <p>无需安装，完全在浏览器本地运行，支持手机与电脑</p>
        </div>

        <div class="card">
            <div id="initStatus">
                <div class="loader"></div>
                <div>正在初始化 Python 环境 (约需几秒钟)...</div>
            </div>

            <div id="uploadContainer" class="hidden">
                <div id="uploadArea" class="upload-area">
                    <span class="material-symbols-rounded upload-icon">upload_file</span>
                    <div class="upload-text">点击选择 .mcz 文件，或将文件拖拽至此处</div>
                    <div class="upload-subtext">支持同时上传多个文件</div>
                    <!-- 移除了 accept 属性以兼容手机端多选 -->
                    <input type="file" id="fileInput" multiple>
                </div>
                
                <div id="fileList" class="file-list"></div>
            </div>
        </div>
    </div>

    <!-- 内嵌 Python 核心转换逻辑 -->
    <script type="text/python" id="pythonCode">
import os
import json
import zipfile
import shutil

def convert(i, bgtmp, soundtmp):
    # 此处为精简版原核心转换逻辑
    try:
        with open(i, encoding='utf-8') as mc:
            mcFile = json.loads(mc.read())
    except:
        return 1

    if not mcFile['meta']['mode'] == 0:
        return 1

    ms = lambda beats, bpm, offset: 1000*(60/bpm)*beats+offset
    beat = lambda beat: beat[0] + beat[1]/beat[2]
    col = lambda column, keys: int(512*(2*column+1)/(2*keys))

    line = mcFile['time']
    meta = mcFile['meta']
    note = mcFile['note']
    
    soundnote = {}
    keys = meta["mode_ext"]["column"]
    for x in note:
        if x.get('type',0):
            soundnote = x

    bpm = [line[0]['bpm']]
    bpmoffset = [-soundnote.get('offset',0)]

    if len(line)>1:
        j=0
        lastbeat=line[0]['beat']
        for x in line[1:]:
            bpm.append(x['bpm'])
            bpmoffset.append(ms(beat(x['beat'])-beat(lastbeat),line[j]['bpm'],bpmoffset[j]))
            j+=1
            lastbeat=x['beat']

    title = meta["song"]["title"]
    artist = meta["song"]["artist"]
    preview = meta.get('preview',-1)
    titleorg = meta['song'].get('titleorg',title)
    artistorg = meta['song'].get('artistorg',artist)
    background = meta["background"]
    if not background=="": bgtmp.append(os.path.join(os.path.dirname(i), background))
    sound = soundnote.get("sound", "")
    if not sound=="": soundtmp.append(os.path.join(os.path.dirname(i), sound))
    creator = meta["creator"]
    version = meta["version"]

    with open(f'{os.path.splitext(i)[0]}.osu',mode='w',encoding='utf-8-sig') as osu:
        osuformat = ['osu file format v14','','[General]',f'AudioFilename: {sound}',
                     'AudioLeadIn: 0',f'PreviewTime: {preview}','Countdown: 0','SampleSet: Soft',
                     'StackLeniency: 0.7','Mode: 3','LetterboxInBreaks: 0','SpecialStyle: 0',
                     'WidescreenStoryboard: 0','','[Editor]','DistanceSpacing: 1.2','BeatDivisor: 4',
                     'GridSize: 8','TimelineZoom: 2.4','','[Metadata]',f'Title:{title}',
                     f'TitleUnicode:{titleorg}',f'Artist:{artist}',f'ArtistUnicode:{artistorg}',
                     f'Creator:{creator}',f'Version:{version}','Source:Malody','Tags:Malody Convert by Jakads Web',
                     'BeatmapID:0','BeatmapSetID:-1','','[Difficulty]','HPDrainRate:8',f'CircleSize:{keys}',
                     'OverallDifficulty:8','ApproachRate:5','SliderMultiplier:1.4','SliderTickRate:1','',
                     '[Events]','//Background and Video events',f'0,0,"{background}",0,0','','[TimingPoints]\n']
        osu.write('\n'.join(osuformat))

        bpmcount = len(bpm)
        for x in range(bpmcount):
            osu.write(f'{bpmoffset[x]},{60000/bpm[x]},{int(line[x].get("sign",4))},1,0,0,1,0\n')

        osu.write('\n\n[HitObjects]')

        for n in note:
            if not n.get('type',0) == 0: continue
            j, k = 0, 0
            for b in line:
                if beat(b['beat']) > beat(n['beat']): j+=1
                else: continue
            if not n.get('endbeat') == None:
                for b in line:
                    if beat(b['beat']) > beat(n['endbeat']): k+=1
                    else: continue
            j=bpmcount-j-1
            k=bpmcount-k-1

            if int(ms(beat(n["beat"]), bpm[j], bpmoffset[j])) >= 0:
                osu.write(f'\n{col(n["column"], keys)},192,{int(ms(beat(n["beat"])-beat(line[j]["beat"]), bpm[j], bpmoffset[j]))}')
                if n.get('endbeat') == None:
                    osu.write(',1,0,0:0:0:')
                else:
                    osu.write(f',128,0,{int(ms(beat(n["endbeat"])-beat(line[k]["beat"]), bpm[k], bpmoffset[k]))}:0:0:0:')
                if n.get('sound') == None:
                    osu.write('0:')
                else:
                    osu.write('{0}:{1}'.format(n['vol'],n['sound'].replace('"','')))
    return 0, title, artist

def process_file_bytes(file_bytes, original_filename):
    import io, traceback
    try:
        # 写入虚拟内存文件前，将可能的 JsProxy 转换为 bytes
        if hasattr(file_bytes, 'to_py'):
            file_bytes = bytes(file_bytes.to_py())
        else:
            file_bytes = bytes(file_bytes)
            
        work_dir = '/workspace'
        if os.path.exists(work_dir):
            shutil.rmtree(work_dir)
        os.makedirs(work_dir)
        
        zip_path = os.path.join(work_dir, original_filename)
        with open(zip_path, 'wb') as f:
            f.write(file_bytes)
        
        extract_dir = os.path.join(work_dir, 'extracted')
        os.makedirs(extract_dir)
        
        # 解压并修复日文乱码
        with zipfile.ZipFile(zip_path, 'r') as mcz:
            for zipinfo in mcz.infolist():
                if zipinfo.flag_bits & 0x800 == 0:
                    try:
                        raw_bytes = zipinfo.filename.encode('cp437')
                        for enc in ['utf-8', 'gbk', 'shift_jis', 'big5']:
                            try:
                                zipinfo.filename = raw_bytes.decode(enc)
                                break
                            except UnicodeDecodeError: pass
                    except: pass
                mcz.extract(zipinfo, extract_dir)
                
        # 转换
        bgtmp = []
        soundtmp = []
        mc_files = []
        mctitle = "Unknown"
        mcartist = "Unknown"
        
        for root, dirs, files in os.walk(extract_dir):
            for file in files:
                if file.endswith('.mc'):
                    full_path = os.path.join(root, file)
                    res = convert(full_path, bgtmp, soundtmp)
                    if type(res) is tuple:
                        mctitle = res[1]
                        mcartist = res[2]
                        mc_files.append(full_path)
                        
        if not mc_files:
            return "ERROR", "压缩包内没有找到支持的 .mc 谱面文件", b""
            
        # 打包为 osz
        osz_name = f"{mcartist} - {mctitle}.osz"
        osz_path = os.path.join(work_dir, osz_name)
        
        with zipfile.ZipFile(osz_path, 'w') as osz:
            for mc in mc_files:
                osu_file = os.path.splitext(mc)[0] + '.osu'
                osz.write(osu_file, os.path.basename(osu_file))
            for bg in set(bgtmp):
                if os.path.exists(bg): osz.write(bg, os.path.basename(bg))
            for snd in set(soundtmp):
                if os.path.exists(snd): osz.write(snd, os.path.basename(snd))
                
        # 读取返回
        with open(osz_path, 'rb') as f:
            final_bytes = f.read()
            
        return "SUCCESS", osz_name, final_bytes
    except Exception as e:
        return "ERROR", str(traceback.format_exc()), b""
    </script>

    <script>
        let pyodide;
        let isProcessing = false;
        const fileQueue = [];

        // 初始化 Pyodide
        async function init() {
            try {
                pyodide = await loadPyodide();
                await pyodide.runPythonAsync(document.getElementById('pythonCode').innerText);
                document.getElementById('initStatus').classList.add('hidden');
                document.getElementById('uploadContainer').classList.remove('hidden');
            } catch (err) {
                document.getElementById('initStatus').innerHTML = `
                    <span class="material-symbols-rounded" style="color: var(--md-sys-color-error); font-size: 48px;">error</span>
                    <div style="color: var(--md-sys-color-error);">环境初始化失败，请刷新重试</div>
                `;
                console.error(err);
            }
        }
        init();

        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const fileList = document.getElementById('fileList');

        uploadArea.addEventListener('click', () => fileInput.click());
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            if (e.dataTransfer.files.length) {
                handleFilesInput(e.dataTransfer.files);
            }
        });
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) {
                handleFilesInput(e.target.files);
                fileInput.value = ''; // Reset input so same files can be selected again
            }
        });

        function handleFilesInput(files) {
            const validFiles = [];
            let invalidCount = 0;
            
            for (let file of files) {
                if (file.name.toLowerCase().endsWith('.mcz') || file.name.toLowerCase().endsWith('.zip')) {
                    validFiles.push(file);
                } else {
                    invalidCount++;
                }
            }
            
            if (invalidCount > 0) {
                alert(`有 ${invalidCount} 个文件格式不支持，已自动过滤。请仅上传 .mcz 或 .zip 文件。`);
            }
            
            if (validFiles.length > 0) {
                enqueueFiles(validFiles);
            }
        }

        function enqueueFiles(files) {
            for (let file of files) {
                const id = 'file-' + Math.random().toString(36).substr(2, 9);
                
                // Add to DOM
                const itemHtml = `
                    <div class="file-item" id="${id}">
                        <span class="material-symbols-rounded file-icon">draft</span>
                        <div class="file-info">
                            <div class="file-name" title="${file.name}">${file.name}</div>
                            <div class="file-status-text" id="${id}-text">等待处理...</div>
                        </div>
                        <div class="status-icon-container" id="${id}-icon">
                            <span class="material-symbols-rounded status-icon" style="opacity: 0.5;">schedule</span>
                        </div>
                    </div>
                `;
                fileList.insertAdjacentHTML('afterbegin', itemHtml);
                
                // Add to queue
                fileQueue.push({ file, id });
            }
            processQueue();
        }

        async function processQueue() {
            if (isProcessing || fileQueue.length === 0) return;
            isProcessing = true;
            
            const item = fileQueue.shift();
            await handleFile(item.file, item.id);
            
            isProcessing = false;
            processQueue();
        }

        async function handleFile(file, id) {
            const statusText = document.getElementById(`${id}-text`);
            const statusIcon = document.getElementById(`${id}-icon`);
            
            statusText.innerText = '正在转换...';
            statusText.style.color = 'var(--md-sys-color-primary)';
            statusIcon.innerHTML = `<div class="loader"></div>`;

            // Give browser a moment to paint the UI updates before blocking Python runs
            await new Promise(resolve => setTimeout(resolve, 50));

            try {
                const arrayBuffer = await file.arrayBuffer();
                const uint8Array = new Uint8Array(arrayBuffer);
                
                const processFunc = pyodide.globals.get('process_file_bytes');
                const result = processFunc(uint8Array, file.name);
                
                const status = result.get(0);
                if (status === "ERROR") {
                    let errMsg = result.get(1);
                    console.error(errMsg);
                    statusText.innerText = '转换失败';
                    statusText.style.color = 'var(--md-sys-color-error)';
                    statusIcon.innerHTML = `<span class="material-symbols-rounded status-icon error" title="请检查控制台了解详细错误信息">error</span>`;
                    return;
                }
                
                const filename = result.get(1);
                const outBytesProxy = result.get(2);
                let outBytes = outBytesProxy.toJs ? outBytesProxy.toJs() : outBytesProxy;
                
                const blob = new Blob([outBytes], { type: "application/octet-stream" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                
                statusText.innerText = '转换成功！即将开始下载。';
                statusText.style.color = 'var(--md-sys-color-success)';
                statusIcon.innerHTML = `<span class="material-symbols-rounded status-icon success">check_circle</span>`;
            } catch (err) {
                console.error(err);
                statusText.innerText = '错误: ' + (err.message || err);
                statusText.style.color = 'var(--md-sys-color-error)';
                statusIcon.innerHTML = `<span class="material-symbols-rounded status-icon error">error</span>`;
            }
        }
    </script>
</body>
</html>
