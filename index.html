<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZHAO's Workspace</title>
    <meta name="description" content="ZHAO的个人主页与工具集">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #FAFAFA;
            --bg-surface: #FFFFFF;
            --text-primary: #111111;
            --text-secondary: #666666;
            --accent: #FF3366; /* Vibrant magenta-red, representing a "hit" or "perfect" in rhythm games */
            --grid-color: rgba(0, 0, 0, 0.03);
            --line-color: rgba(0, 0, 0, 0.1);
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            min-height: 100vh;
            /* Engineering/precision grid background */
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 40px 40px;
            background-position: center top;
            display: flex;
            justify-content: center;
        }

        .layout-wrapper {
            width: 100%;
            max-width: 800px;
            padding: 100px 20px;
            position: relative;
            box-sizing: border-box;
        }

        /* The Timeline / Ruler */
        .layout-wrapper::before {
            content: '';
            position: absolute;
            top: 0;
            bottom: 0;
            left: 40px;
            width: 1px;
            background-color: var(--line-color);
            z-index: 0;
        }

        header, main, footer {
            padding-left: 60px; /* Offset from timeline */
            position: relative;
            z-index: 1;
        }

        header {
            margin-bottom: 80px;
            animation: fade-in 0.8s ease-out;
        }

        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 4rem;
            font-weight: 700;
            letter-spacing: -0.04em;
            margin: 0 0 24px 0;
            color: var(--text-primary);
            position: relative;
            display: flex;
            align-items: center;
        }

        /* Signature Accent Dot - The Rhythm Game "Hit Circle" */
        h1::after {
            content: '';
            display: inline-block;
            width: 16px;
            height: 16px;
            background-color: var(--accent);
            border-radius: 50%;
            margin-left: 16px;
            animation: pulse 2s infinite cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        p.subtitle {
            font-size: 1.15rem;
            line-height: 1.6;
            color: var(--text-secondary);
            max-width: 500px;
            margin: 0;
        }

        .section-marker {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--text-secondary);
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            font-weight: 600;
        }

        /* Line connecting the section to the timeline */
        .section-marker::before {
            content: '';
            display: block;
            width: 20px;
            height: 1px;
            background-color: var(--line-color);
            margin-right: 15px;
            margin-left: -40px; /* Pull back to touch timeline (60px padding - 40px = 20px offset, which perfectly touches the timeline at left: 40px relative to wrapper) */
        }

        .projects {
            animation: fade-in 0.8s ease-out 0.2s both;
        }

        .project-item {
            display: block;
            text-decoration: none;
            background: var(--bg-surface);
            border: 1px solid rgba(0,0,0,0.06);
            padding: 35px 40px;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            position: relative;
            /* Give it a slight technical "card" feel without being rounded */
            border-radius: 2px;
        }

        /* Left border accent line on hover */
        .project-item::before {
            content: '';
            position: absolute;
            left: -1px;
            top: -1px;
            bottom: -1px;
            width: 3px;
            background-color: var(--accent);
            transform: scaleY(0);
            transform-origin: bottom;
            transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .project-item:hover {
            box-shadow: 0 20px 40px -15px rgba(0,0,0,0.05);
            border-color: transparent;
            transform: translateY(-2px);
        }

        .project-item:hover::before {
            transform: scaleY(1);
            transform-origin: top;
        }

        .project-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .project-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--text-primary);
            margin: 0;
            transition: color 0.2s ease;
        }

        .project-item:hover .project-title {
            color: var(--accent);
        }

        .project-meta {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.75rem;
            color: var(--text-secondary);
            background: var(--bg-base);
            padding: 4px 8px;
            border-radius: 2px;
            letter-spacing: 0.05em;
        }

        .project-desc {
            font-size: 1rem;
            color: var(--text-secondary);
            line-height: 1.6;
            margin: 0;
        }

        footer {
            margin-top: 100px;
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-family: 'Space Grotesk', sans-serif;
            animation: fade-in 0.8s ease-out 0.4s both;
            display: flex;
            align-items: center;
        }

        footer::before {
            content: '';
            display: block;
            width: 10px;
            height: 1px;
            background-color: var(--line-color);
            margin-right: 15px;
            margin-left: -30px;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 51, 102, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(255, 51, 102, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 51, 102, 0); }
        }

        @keyframes fade-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            .layout-wrapper::before { left: 20px; }
            header, main, footer { padding-left: 40px; }
            .section-marker::before { margin-left: -30px; width: 15px; }
            footer::before { margin-left: -20px; width: 5px; }
            h1 { font-size: 2.8rem; }
            .project-item { padding: 25px 20px; }
            .project-header { flex-direction: column; align-items: flex-start; gap: 8px; }
        }
    </style>
</head>
<body>
    <div class="layout-wrapper">
        <header>
            <h1>Hi, I'm ZHAO.</h1>
            <p class="subtitle">欢迎来到我的工作区。这里存放着我开发/fork的实用工具和个人项目。</p>
        </header>

        <main>
            <div class="section-marker">Tools & Projects</div>
            
            <div class="projects">
                <a href="./malody2osu/" class="project-item">
                    <div class="project-header">
                        <h2 class="project-title">Malody to osu!</h2>
                        <span class="project-meta">Converter</span>
                    </div>
                    <p class="project-desc">一个无需安装、纯浏览器本地运行的 .mcz 到 .osz 格式转换工具，支持批量多选处理。</p>
                </a>
                
                <a href="./osu-downloader/" class="project-item" style="margin-top: 20px;">
                    <div class="project-header">
                        <h2 class="project-title">osu! Downloader</h2>
                        <span class="project-meta">Tool</span>
                    </div>
                    <p class="project-desc">快速下载 osu! 谱面的网页工具，支持直接解析谱面链接并通过镜像加速下载。</p>
                </a>
                
                <!-- Future projects can be added here -->
            </div>
        </main>

        <footer>
            &copy; 2026 ZHAO. Engineered with precision.
        </footer>
    </div>
</body>
</html>
