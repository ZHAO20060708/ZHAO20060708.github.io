<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZHAO's Portfolio</title>
    <meta name="description" content="ZHAO的个人主页与项目展示">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #60a5fa;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --glow: rgba(59, 130, 246, 0.4);
        }

        body {
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: radial-gradient(circle at 15% 50%, rgba(30, 58, 138, 0.4), transparent 50%),
                        radial-gradient(circle at 85% 30%, rgba(88, 28, 135, 0.3), transparent 50%),
                        #0f172a;
            overflow-x: hidden;
        }

        .container {
            max-width: 900px;
            width: 90%;
            padding: 40px 20px;
            z-index: 10;
        }

        header {
            text-align: center;
            margin-bottom: 70px;
            animation: fadeInDown 1s ease-out forwards;
            opacity: 0;
            transform: translateY(-20px);
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #60a5fa, #c084fc, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        p.subtitle {
            font-size: 1.2rem;
            color: var(--text-muted);
            max-width: 550px;
            margin: 0 auto;
            line-height: 1.7;
        }

        .projects {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
            animation: fadeInUp 1s ease-out 0.3s forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        .project-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 30px;
            text-decoration: none;
            color: inherit;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .project-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.05), rgba(255,255,255,0));
            opacity: 0;
            transition: opacity 0.4s ease;
            z-index: 0;
        }

        .project-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: rgba(96, 165, 250, 0.4);
            box-shadow: 0 15px 35px -10px rgba(0, 0, 0, 0.6), 0 0 25px -5px var(--glow);
        }

        .project-card:hover::before {
            opacity: 1;
        }

        .project-content {
            position: relative;
            z-index: 1;
        }

        .project-title {
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .project-title svg {
            width: 24px;
            height: 24px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            opacity: 0;
            transform: translateX(-15px);
            transition: all 0.4s ease;
            color: var(--accent-hover);
        }

        .project-card:hover .project-title svg {
            opacity: 1;
            transform: translateX(0);
        }

        .project-desc {
            font-size: 1.05rem;
            color: var(--text-muted);
            line-height: 1.6;
        }

        footer {
            margin-top: 100px;
            text-align: center;
            font-size: 0.95rem;
            color: var(--text-muted);
            animation: fadeIn 1s ease-out 0.6s forwards;
            opacity: 0;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Abstract Background Shapes */
        .shape {
            position: absolute;
            filter: blur(100px);
            z-index: 0;
            opacity: 0.4;
            animation: float 25s infinite alternate ease-in-out;
            pointer-events: none;
        }
        .shape-1 {
            width: 350px; height: 350px;
            background: #3b82f6;
            top: -50px; left: -100px;
            border-radius: 50%;
        }
        .shape-2 {
            width: 450px; height: 450px;
            background: #a855f7;
            bottom: -150px; right: -150px;
            border-radius: 50%;
            animation-delay: -5s;
        }

        @media (max-width: 768px) {
            h1 { font-size: 2.8rem; }
            .projects { grid-template-columns: 1fr; }
            .project-card { padding: 25px; }
        }
    </style>
</head>
<body>
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    
    <div class="container">
        <header>
            <h1>Hi, I'm ZHAO.</h1>
            <p class="subtitle">欢迎来到我的主页。这里存放着我开发的一些实用小工具和个人项目。</p>
        </header>

        <main class="projects">
            <a href="./malody2osu/" class="project-card">
                <div class="project-content">
                    <div class="project-title">
                        Malody to osu! Converter
                        <svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                    </div>
                    <div class="project-desc">一个无需安装、纯浏览器本地运行的格式转换工具，支持批量多选处理。</div>
                </div>
            </a>
            
            <!-- 未来如果有更多项目，可以继续添加到这里 -->
        </main>

        <footer>
            &copy; 2026 ZHAO. 
        </footer>
    </div>
</body>
</html>
