<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZHAO20060708</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #fcfcfc;
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            max-width: 600px;
            padding: 40px 20px;
            text-align: left;
            width: 100%;
            box-sizing: border-box;
        }
        h1 {
            font-size: 2.5rem;
            font-weight: 600;
            margin-bottom: 10px;
            color: #111;
        }
        p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #555;
            margin-bottom: 30px;
        }
        .projects {
            margin-top: 40px;
        }
        .projects h2 {
            font-size: 1.2rem;
            font-weight: 600;
            color: #222;
            margin-bottom: 15px;
            border-bottom: 1px solid #eaeaea;
            padding-bottom: 8px;
        }
        .project-item {
            display: block;
            padding: 15px 0;
            text-decoration: none;
            color: inherit;
            border-bottom: 1px solid #f0f0f0;
            transition: transform 0.2s ease;
        }
        .project-item:hover {
            transform: translateX(8px);
        }
        .project-title {
            font-weight: 600;
            color: #0070f3;
            font-size: 1.1rem;
            margin-bottom: 5px;
            transition: color 0.2s ease;
        }
        .project-item:hover .project-title {
            color: #0051b3;
        }
        .project-desc {
            font-size: 0.95rem;
            color: #666;
        }
        footer {
            margin-top: 60px;
            font-size: 0.85rem;
            color: #999;
            text-align: left;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Hi, I'm ZHAO.</h1>
        <p>欢迎来到我的主页。这里存放着我开发的一些实用小工具和个人项目。</p>

        <div class="projects">
            <h2>我的项目 (Projects)</h2>
            
            <a href="./malody2osu/" class="project-item">
                <div class="project-title">Malody to osu! Converter</div>
                <div class="project-desc">一个无需安装、纯浏览器本地运行的格式转换工具，支持批量多选处理。</div>
            </a>
            
            <!-- 未来如果有更多项目，可以继续添加到这里 -->
        </div>
