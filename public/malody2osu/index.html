    <style>
        :root {
            --bg-base: #FAFAFA;
            --bg-surface: #FFFFFF;
            --text-primary: #111111;
            --text-secondary: #666666;
            --accent: #FF3366; 
            --grid-color: rgba(0, 0, 0, 0.03);

        h1 {

            overflow-y: auto;

        .file-icon {

        .file-name {

        .status-icon-container {

        #initStatus {

        @keyframes fade-in {

    <!-- 内嵌 Python 核心转换逻辑 -->
    <script type="text/python" id="pythonCode">
import os
import json
import zipfile
import shutil

def convert(i, bgtmp, soundtmp):
    try:
        with open(i, encoding='utf-8') as mc:
            mcFile = json.loads(mc.read())
    except:
        return 1

    if not mcFile['meta']['mode'] == 0:
        return 1

    ms = lambda beats, bpm, offset: 1000*(60/bpm)*beats+offset
    beat = lambda beat: beat[0] + beat[1]/beat[2]
    col = lambda column, keys: int(512*(2*column+1)/(2*keys))

    line = mcFile['time']
    meta = mcFile['meta']
    note = mcFile['note']
    
    soundnote = {}
    keys = meta["mode_ext"]["column"]
    for x in note:
        if x.get('type',0):
            soundnote = x

    bpm = [line[0]['bpm']]
    bpmoffset = [-soundnote.get('offset',0)]

    if len(line)>1:
        j=0
        lastbeat=line[0]['beat']
        for x in line[1:]:
            bpm.append(x['bpm'])
            bpmoffset.append(ms(beat(x['beat'])-beat(lastbeat),line[j]['bpm'],bpmoffset[j]))
            j+=1
            lastbeat=x['beat']

    title = meta["song"]["title"]
    artist = meta["song"]["artist"]
    preview = meta.get('preview',-1)
    titleorg = meta['song'].get('titleorg',title)
    artistorg = meta['song'].get('artistorg',artist)
    background = meta["background"]
    if not background=="": bgtmp.append(os.path.join(os.path.dirname(i), background))
    sound = soundnote.get("sound", "")
    if not sound=="": soundtmp.append(os.path.join(os.path.dirname(i), sound))
    creator = meta["creator"]
    version = meta["version"]

    with open(f'{os.path.splitext(i)[0]}.osu',mode='w',encoding='utf-8-sig') as osu:
        osuformat = ['osu file format v14','','[General]',f'AudioFilename: {sound}',
                     'AudioLeadIn: 0',f'PreviewTime: {preview}','Countdown: 0','SampleSet: Soft',
                     'StackLeniency: 0.7','Mode: 3','LetterboxInBreaks: 0','SpecialStyle: 0',
                     'WidescreenStoryboard: 0','','[Editor]','DistanceSpacing: 1.2','BeatDivisor: 4',
                     'GridSize: 8','TimelineZoom: 2.4','','[Metadata]',f'Title:{title}',
                     f'TitleUnicode:{titleorg}',f'Artist:{artist}',f'ArtistUnicode:{artistorg}',
                     f'Creator:{creator}',f'Version:{version}','Source:Malody','Tags:Malody Convert by Jakads Web',
                     'BeatmapID:0','BeatmapSetID:-1','','[Difficulty]','HPDrainRate:8',f'CircleSize:{keys}',
                     'OverallDifficulty:8','ApproachRate:5','SliderMultiplier:1.4','SliderTickRate:1','',
                     '[Events]','//Background and Video events',f'0,0,"{background}",0,0','','[TimingPoints]\n']
        osu.write('\n'.join(osuformat))

        bpmcount = len(bpm)
        for x in range(bpmcount):
            osu.write(f'{bpmoffset[x]},{60000/bpm[x]},{int(line[x].get("sign",4))},1,0,0,1,0\n')

        osu.write('\n\n[HitObjects]')

        for n in note:
            if not n.get('type',0) == 0: continue
            j, k = 0, 0
            for b in line:
                if beat(b['beat']) > beat(n['beat']): j+=1
                else: continue
            if not n.get('endbeat') == None:
                for b in line:
                    if beat(b['beat']) > beat(n['endbeat']): k+=1
                    else: continue
            j=bpmcount-j-1
            k=bpmcount-k-1

            if int(ms(beat(n["beat"]), bpm[j], bpmoffset[j])) >= 0:
                osu.write(f'\n{col(n["column"], keys)},192,{int(ms(beat(n["beat"])-beat(line[j]["beat"]), bpm[j], bpmoffset[j]))}')
                if n.get('endbeat') == None:
                    osu.write(',1,0,0:0:0:')
                else:
                    osu.write(f',128,0,{int(ms(beat(n["endbeat"])-beat(line[k]["beat"]), bpm[k], bpmoffset[k]))}:0:0:0:')
                if n.get('sound') == None:
                    osu.write('0:')
                else:
                    osu.write('{0}:{1}'.format(n['vol'],n['sound'].replace('"','')))
    return 0, title, artist

def process_file_bytes(file_bytes, original_filename):
    import io, traceback
    try:
        if hasattr(file_bytes, 'to_py'):
            file_bytes = bytes(file_bytes.to_py())
        else:
            file_bytes = bytes(file_bytes)
            
        work_dir = '/workspace'
        if os.path.exists(work_dir):
            shutil.rmtree(work_dir)
        os.makedirs(work_dir)
        
        zip_path = os.path.join(work_dir, original_filename)
        with open(zip_path, 'wb') as f:
            f.write(file_bytes)
        
        extract_dir = os.path.join(work_dir, 'extracted')
        os.makedirs(extract_dir)
        
        with zipfile.ZipFile(zip_path, 'r') as mcz:
            for zipinfo in mcz.infolist():
                if zipinfo.flag_bits & 0x800 == 0:
                    try:
                        raw_bytes = zipinfo.filename.encode('cp437')
                        for enc in ['utf-8', 'gbk', 'shift_jis', 'big5']:
                            try:
                                zipinfo.filename = raw_bytes.decode(enc)
                                break
                            except UnicodeDecodeError: pass
                    except: pass
                mcz.extract(zipinfo, extract_dir)
                
        bgtmp = []
        soundtmp = []
        mc_files = []
        mctitle = "Unknown"
        mcartist = "Unknown"
        
        for root, dirs, files in os.walk(extract_dir):
            for file in files:
                if file.endswith('.mc'):
                    full_path = os.path.join(root, file)
                    res = convert(full_path, bgtmp, soundtmp)
                    if type(res) is tuple:
                        mctitle = res[1]
                        mcartist = res[2]
                        mc_files.append(full_path)
                        
        if not mc_files:
            return "ERROR", "压缩包内没有找到支持的 .mc 谱面文件", b""
            
        osz_name = f"{mcartist} - {mctitle}.osz"
        osz_path = os.path.join(work_dir, osz_name)
        
        with zipfile.ZipFile(osz_path, 'w') as osz:
            for mc in mc_files:
                osu_file = os.path.splitext(mc)[0] + '.osu'
                osz.write(osu_file, os.path.basename(osu_file))
            for bg in set(bgtmp):
                if os.path.exists(bg): osz.write(bg, os.path.basename(bg))
            for snd in set(soundtmp):
                if os.path.exists(snd): osz.write(snd, os.path.basename(snd))
                
        with open(osz_path, 'rb') as f:
            final_bytes = f.read()
            
        return "SUCCESS", osz_name, final_bytes
    except Exception as e:
        return "ERROR", str(traceback.format_exc()), b""
    </script>

    <script>
        const i18n = {
            'en': {
                back: '← Back to Workspace',
                subtitle: 'No installation required, completely runs locally in browser. Supports mobile and PC.',
                initWait: 'Initializing Python Environment (takes a few seconds)...',
                initFail: 'Environment initialization failed. Please refresh and try again.',
                uploadTitle: 'Click to select .mcz files, or drag & drop here',
                uploadSub: 'Supports multiple file upload at once',
                unsupportedFiles: (n) => `${n} unsupported files filtered. Please upload .mcz or .zip files only.`,
                waitProcess: 'Waiting to process...',
                processing: 'Converting...',
                fail: 'Conversion failed',
                success: 'Conversion successful! Download starting.',
                langToggle: '中文'
            },
            'zh': {
                back: '← 返回工作区',
                subtitle: '无需安装，完全在浏览器本地运行，支持手机与电脑',
                initWait: '正在初始化 Python 环境 (约需几秒钟)...',
                initFail: '环境初始化失败，请刷新重试',
                uploadTitle: '点击选择 .mcz 文件，或将文件拖拽至此处',
                uploadSub: '支持同时上传多个文件',
                unsupportedFiles: (n) => `有 ${n} 个文件格式不支持，已自动过滤。请仅上传 .mcz 或 .zip 文件。`,
                waitProcess: '等待处理...',
                processing: '正在转换...',
                fail: '转换失败',
                success: '转换成功！即将开始下载。',
                langToggle: 'English'
            }
        };

        let currentLang = 'zh';

        function toggleLang() {
            currentLang = currentLang === 'zh' ? 'en' : 'zh';
            updateLang();
        }

        function updateLang() {
            const texts = i18n[currentLang];
            document.getElementById('text-back').innerText = texts.back;
            document.getElementById('text-subtitle').innerText = texts.subtitle;
            const initTextEl = document.getElementById('initText');
            if (initTextEl) initTextEl.innerText = texts.initWait;
            document.getElementById('text-upload-title').innerText = texts.uploadTitle;
            document.getElementById('text-upload-sub').innerText = texts.uploadSub;
            document.getElementById('lang-btn').innerText = texts.langToggle;
            
            document.querySelectorAll('.file-item').forEach(item => {
                const id = item.id;
                const statusTextEl = document.getElementById(`${id}-text`);
                if (statusTextEl) {
                    const status = statusTextEl.getAttribute('data-status');
                    if (status === 'waiting') {
                        statusTextEl.innerText = texts.waitProcess;
                    } else if (status === 'processing') {
                        statusTextEl.innerText = texts.processing;
                    } else if (status === 'success') {
                        statusTextEl.innerText = texts.success;
                    } else if (status === 'fail') {
                        statusTextEl.innerText = texts.fail;
                    } else if (status && status.startsWith('error:')) {
                        statusTextEl.innerText = (currentLang === 'zh' ? '错误: ' : 'Error: ') + status.substring(6);
                    }
                }
            });
            if (window.updateThemeText) window.updateThemeText();
        }

        let pyodide;
        let isProcessing = false;
        const fileQueue = [];

        async function init() {
            try {
                pyodide = await loadPyodide();
                await pyodide.runPythonAsync(document.getElementById('pythonCode').innerText);
                document.getElementById('initStatus').classList.add('hidden');
                document.getElementById('uploadContainer').classList.remove('hidden');
            } catch (err) {
                const texts = i18n[currentLang];
                document.getElementById('initStatus').innerHTML = `
                    <span class="material-symbols-rounded" style="color: var(--error); font-size: 48px;">error</span>
                    <div style="color: var(--error);">${texts.initFail}</div>
                `;
                console.error(err);
            }
        }
        init();

        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const fileList = document.getElementById('fileList');

        uploadArea.addEventListener('click', () => fileInput.click());
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            if (e.dataTransfer.files.length) {
                handleFilesInput(e.dataTransfer.files);
            }
        });
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) {
                handleFilesInput(e.target.files);
                fileInput.value = ''; 
            }
        });

        function handleFilesInput(files) {
            const validFiles = [];
            let invalidCount = 0;
            
            for (let file of files) {
                if (file.name.toLowerCase().endsWith('.mcz') || file.name.toLowerCase().endsWith('.zip')) {
                    validFiles.push(file);
                } else {
                    invalidCount++;
                }
            }
            
            if (invalidCount > 0) {
                alert(i18n[currentLang].unsupportedFiles(invalidCount));
            }
            
            if (validFiles.length > 0) {
                enqueueFiles(validFiles);
            }
        }

        function enqueueFiles(files) {
            for (let file of files) {
                const id = 'file-' + Math.random().toString(36).substr(2, 9);
                const texts = i18n[currentLang];
                
                const itemHtml = `
                    <div class="file-item" id="${id}">
                        <span class="material-symbols-rounded file-icon">draft</span>
                        <div class="file-info">
                            <div class="file-name" title="${file.name}">${file.name}</div>
                            <div class="file-status-text" id="${id}-text" data-status="waiting">${texts.waitProcess}</div>
                        </div>
                        <div class="status-icon-container" id="${id}-icon">
                            <span class="material-symbols-rounded status-icon" style="opacity: 0.5;">schedule</span>
                        </div>
                    </div>
                `;
                fileList.insertAdjacentHTML('afterbegin', itemHtml);
                
                fileQueue.push({ file, id });
            }
            processQueue();
        }

        async function processQueue() {
            if (isProcessing || fileQueue.length === 0) return;
            isProcessing = true;
            
            const item = fileQueue.shift();
            await handleFile(item.file, item.id);
            
            isProcessing = false;
            processQueue();
        }

        async function handleFile(file, id) {
            const texts = i18n[currentLang];
            const statusText = document.getElementById(`${id}-text`);
            const statusIcon = document.getElementById(`${id}-icon`);
            
            statusText.setAttribute('data-status', 'processing');
            statusText.innerText = texts.processing;
            statusText.style.color = 'var(--accent)';
            statusIcon.innerHTML = `<div class="loader"></div>`;

            await new Promise(resolve => setTimeout(resolve, 50));

            try {
                const arrayBuffer = await file.arrayBuffer();
                const uint8Array = new Uint8Array(arrayBuffer);
                
                const processFunc = pyodide.globals.get('process_file_bytes');
                const result = processFunc(uint8Array, file.name);
                
                const status = result.get(0);
                if (status === "ERROR") {
                    let errMsg = result.get(1);
                    console.error(errMsg);
                    statusText.setAttribute('data-status', 'fail');
                    statusText.innerText = texts.fail;
                    statusText.style.color = 'var(--error)';
                    statusIcon.innerHTML = `<span class="material-symbols-rounded status-icon error" title="Please check console for details">error</span>`;
                    return;
                }
                
                const filename = result.get(1);
                const outBytesProxy = result.get(2);
                let outBytes = outBytesProxy.toJs ? outBytesProxy.toJs() : outBytesProxy;
                
                const blob = new Blob([outBytes], { type: "application/octet-stream" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                
                statusText.setAttribute('data-status', 'success');
                statusText.innerText = texts.success;
                statusText.style.color = 'var(--success)';
                statusIcon.innerHTML = `<span class="material-symbols-rounded status-icon success">check_circle</span>`;
            } catch (err) {
                console.error(err);
                const errMsg = err.message || err;
                statusText.setAttribute('data-status', 'error:' + errMsg);
                statusText.innerText = (currentLang === 'zh' ? '错误: ' : 'Error: ') + errMsg;
                statusText.style.color = 'var(--error)';
                statusIcon.innerHTML = `<span class="material-symbols-rounded status-icon error">error</span>`;
            }
        }
    </script>
    <script>
        // Theme Toggle Logic
        const themes = ['system', 'light', 'dark'];
        const icons = { 'system': '◐', 'light': '☼', 'dark': '☾' };
        
        document.addEventListener('DOMContentLoaded', () => {
            const themeBtn = document.getElementById('theme-btn');
            const themeText = themeBtn?.querySelector('.theme-text');
            const themeIcon = themeBtn?.querySelector('.theme-icon');

            let currentThemeIdx = 0;
            const savedPreference = localStorage.getItem('theme-preference') || 'system';
            currentThemeIdx = themes.indexOf(savedPreference);
            if (currentThemeIdx === -1) currentThemeIdx = 0;
            updateTheme(themes[currentThemeIdx]);

            themeBtn?.addEventListener('click', () => {
                currentThemeIdx = (currentThemeIdx + 1) % themes.length;
                updateTheme(themes[currentThemeIdx]);
            });

            function updateTheme(themeName) {
                localStorage.setItem('theme-preference', themeName);
                if (themeText) {
                    const translations = {
                        'zh': { 'system': '跟随系统', 'light': '浅色', 'dark': '深色' },
                        'en': { 'system': 'System', 'light': 'Light', 'dark': 'Dark' }
                    };
                    themeText.textContent = translations[currentLang][themeName] || themeName;
                }
                if (themeIcon) themeIcon.textContent = icons[themeName];

                if (themeName === 'system') {
                    const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                    document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
                    localStorage.removeItem('theme');
                } else {
                    document.documentElement.setAttribute('data-theme', themeName);
                    localStorage.setItem('theme', themeName);
                }
            }

            window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
                if (localStorage.getItem('theme-preference') === 'system') {
                    document.documentElement.setAttribute('data-theme', e.matches ? 'dark' : 'light');
                }
            });
            
            window.updateThemeText = () => updateTheme(themes[currentThemeIdx]);
        });
    </script>
</body>
</html>
